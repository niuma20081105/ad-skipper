name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Download Gradle
        run: |
          echo "Downloading Gradle 8.5..."
          curl -sSfL --retry 3 --retry-delay 10 \
            "https://services.gradle.org/distributions/gradle-8.5-bin.zip" \
            -o /tmp/gradle.zip
          echo "Extracting..."
          unzip -q /tmp/gradle.zip -d /tmp/gradle-install
          echo "Gradle ready"

      - name: Build APK
        run: |
          export ANDROID_HOME="${ANDROID_HOME:-${ANDROID_SDK_ROOT}}"
          /tmp/gradle-install/gradle-8.5/bin/gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ad-skipper-debug
          path: app/build/outputs/apk/debug/app-debug.apk
